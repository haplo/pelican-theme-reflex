name: Publish example site
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install build tools
        run: python -m pip install --upgrade build twine
      - name: Build package
        run: python -m build
      - name: Check package metadata
        run: twine check dist/*
      - name: Install theme from wheel
        run: pip install dist/*.whl
      - name: Install Stork binary
        run: |
          wget -q https://files.stork-search.net/releases/v1.6.0/stork-ubuntu-22-04
          chmod +x stork-ubuntu-22-04
          sudo mv stork-ubuntu-22-04 /usr/local/bin/stork
      - name: Install Pelican dependencies
        run: pip install -r example/requirements.txt
      - name: Build site
        run: make publish
        working-directory: example
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: example/blog

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
        id: deployment
